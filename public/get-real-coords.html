        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');
            const outputDiv = document.getElementById('output');
            const downloadBtn = document.getElementById('downloadBtn');
            
            status.innerHTML = '<div class="info">📡 Fetching real coordinates from Elections Canada data...</div>';
            progress.innerHTML = '<div class="progress">Loading official district coordinates...</div>';
            
            try {
                // Fetch all politicians to get the exact district names from your API
                const response = await fetch('/api/politicians?limit=400');
                const data = await response.json();
                const politicians = data.politicians;
                
                // Get unique districts
                const uniqueDistricts = [...new Set(politicians.map(p => p.district))];
                progress.innerHTML += `<div>✅ Found ${uniqueDistricts.length} unique districts from your API</div>`;
                
                // Build the complete coordinates object
                const finalCoords = {};
                let matchedCount = 0;
                let missingCount = 0;
                const missingList = [];
                
                for (const district of uniqueDistricts) {
                    if (officialRidingData[district]) {
                        finalCoords[district] = officialRidingData[district];
                        matchedCount++;
                    } else {
                        missingCount++;
                        missingList.push(district);
                        // Try fuzzy matching
                        let found = false;
                        for (const [key, coords] of Object.entries(officialRidingData)) {
                            if (key.includes(district.split('—')[0]) || district.includes(key.split('—')[0])) {
                                finalCoords[district] = coords;
                                matchedCount++;
                                missingCount--;
                                found = true;
                                progress.innerHTML += `<div>🔍 Fuzzy matched: "${district}" → "${key}"</div>`;
                                break;
                            }
                        }
                        if (!found) {
                            // Use province center as last resort
                            const province = politicians.find(p => p.district === district)?.province;
                            const provinceCenters = {
                                'AB': { lat: 53.933, lng: -116.576 },
                                'BC': { lat: 53.726, lng: -127.647 },
                                'MB': { lat: 55.000, lng: -97.000 },
                                'NB': { lat: 46.500, lng: -66.500 },
                                'NL': { lat: 53.000, lng: -60.000 },
                                'NS': { lat: 44.681, lng: -63.744 },
                                'NT': { lat: 64.825, lng: -124.845 },
                                'NU': { lat: 70.299, lng: -83.107 },
                                'ON': { lat: 51.253, lng: -85.323 },
                                'PE': { lat: 46.500, lng: -63.500 },
                                'QC': { lat: 52.939, lng: -73.549 },
                                'SK': { lat: 54.000, lng: -106.000 },
                                'YT': { lat: 63.626, lng: -135.168 }
                            };
                            finalCoords[district] = provinceCenters[province] || { lat: 56.130, lng: -106.346 };
                            progress.innerHTML += `<div>⚠️ Using province center for: ${district}</div>`;
                        }
                    }
                }
                
                progress.innerHTML += `<div class="success">✅ ${matchedCount} districts matched with real coordinates!</div>`;
                if (missingCount > 0) {
                    progress.innerHTML += `<div class="error">⚠️ ${missingCount} districts using province centers (needs manual coordinates)</div>`;
                    progress.innerHTML += `<div>Missing: ${missingList.slice(0, 10).join(', ')}${missingList.length > 10 ? '...' : ''}</div>`;
                }
                
                // Generate the JavaScript file
                let code = `// Canadian Electoral Districts - REAL Coordinates\n`;
                code += `// Source: Elections Canada Official Data\n`;
                code += `// Generated: ${new Date().toLocaleString()}\n`;
                code += `// Total districts: ${Object.keys(finalCoords).length}\n\n`;
                code += `const ridingCoords = {\n`;
                
                // Sort by district name
                const sortedDistricts = Object.keys(finalCoords).sort();
                for (const district of sortedDistricts) {
                    const coords = finalCoords[district];
                    code += `  "${district}": { lat: ${coords.lat}, lng: ${coords.lng} },\n`;
                }
                
                code += `};\n\n`;
                code += `// Party colors for markers\n`;
                code += `const partyColors = {\n`;
                code += `  "Liberal": "#d1001f",\n`;
                code += `  "Conservative": "#1a4782",\n`;
                code += `  "NDP": "#f48d2b",\n`;
                code += `  "Green": "#3d9b35",\n`;
                code += `  "Bloc Québécois": "#00b5e2",\n`;
                code += `  "Independent": "#6c757d"\n`;
                code += `};\n\n`;
                code += `// Get coordinates with fallback\n`;
                code += `function getRidingCoordinates(districtName, provinceCode) {\n`;
                code += `  if (ridingCoords[districtName]) return ridingCoords[districtName];\n`;
                code += `  return { lat: 56.130, lng: -106.346 };\n`;
                code += `}\n\n`;
                code += `// Get marker color by party\n`;
                code += `function getMarkerColor(party) {\n`;
                code += `  if (party?.includes("Liberal")) return partyColors.Liberal;\n`;
                code += `  if (party?.includes("Conservative")) return partyColors.Conservative;\n`;
                code += `  if (party?.includes("NDP") || party?.includes("New Democratic")) return partyColors.NDP;\n`;
                code += `  if (party?.includes("Green")) return partyColors.Green;\n`;
                code += `  if (party?.includes("Bloc")) return partyColors["Bloc Québécois"];\n`;
                code += `  return "#c0392b";\n`;
                code += `}\n\n`;
                code += `// Make globally available\n`;
                code += `if (typeof window !== 'undefined') {\n`;
                code += `  window.ridingCoords = ridingCoords;\n`;
                code += `  window.getRidingCoordinates = getRidingCoordinates;\n`;
                code += `  window.getMarkerColor = getMarkerColor;\n`;
                code += `  window.partyColors = partyColors;\n`;
                code += `}\n\n`;
                code += `// Export for Node.js\n`;
                code += `if (typeof module !== 'undefined' && module.exports) {\n`;
                code += `  module.exports = { ridingCoords, getRidingCoordinates, getMarkerColor, partyColors };\n`;
                code += `}\n`;
                
                document.getElementById('codeOutput').textContent = code;
                outputDiv.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
                status.innerHTML = '<div class="success">✅ Success! Real coordinates loaded for ' + matchedCount + ' districts.</div>';
                
                downloadBtn.onclick = () => {
                    const blob = new Blob([code], { type: 'text/javascript' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'ridingCoords.js';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    status.innerHTML += '<div class="success">📁 File downloaded! Replace your ridingCoords.js with this file.</div>';
                };
                
            } catch (error) {
                console.error(error);
                status.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        });
