<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Know Your Rep - Canadian Politicians</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <header>
    <h1><i class="fas fa-landmark"></i> Know Your Rep</h1>
    <p>Discover your local political representatives beyond party lines</p>
    <p><small>Data from <a href="https://openparliament.ca" target="_blank">openparliament.ca</a></small></p>
  </header>
  
  <div id="controls">
    <div id="search-wrapper">
      <input type="text" id="search" placeholder="Search by name or district…" autocomplete="off" />
      <ul id="dropdown" hidden></ul>
    </div>
    <select id="province-filter">
      <option value="">All provinces</option>
      <option value="AB">Alberta</option>
      <option value="BC">British Columbia</option>
      <option value="MB">Manitoba</option>
      <option value="NB">New Brunswick</option>
      <option value="NL">Newfoundland and Labrador</option>
      <option value="NS">Nova Scotia</option>
      <option value="NT">Northwest Territories</option>
      <option value="NU">Nunavut</option>
      <option value="ON">Ontario</option>
      <option value="PE">Prince Edward Island</option>
      <option value="QC">Quebec</option>
      <option value="SK">Saskatchewan</option>
      <option value="YT">Yukon</option>
    </select>
    <button id="use-location" class="location-btn">
      <i class="fas fa-location-dot"></i> My Location
    </button>
  </div>
  
  <div id="status"></div>
  <div id="map"></div>
  <div id="results"></div>
  <div id="pagination"></div>
  
  <!-- Politician Detail Modal -->
  <div id="politician-modal" class="modal" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-name"></h2>
        <button id="close-modal" class="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <p><strong><i class="fas fa-tag"></i> Party:</strong> <span id="modal-party"></span></p>
        <p><strong><i class="fas fa-map-marker-alt"></i> District:</strong> <span id="modal-district"></span></p>
        <p><strong><i class="fas fa-calendar-alt"></i> Province:</strong> <span id="modal-province"></span></p>
        <div id="modal-quotes" class="quotes-section">
          <h4><i class="fas fa-quote-left"></i> Recent Activity</h4>
          <p id="modal-quotes-text">Loading quotes and statements...</p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="ridingCoords.js"></script>
  <script src="app.js"></script>
</body>
</html>
